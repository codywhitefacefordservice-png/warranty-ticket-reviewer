<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Sign in — Whiteface Ford Warranty Reviewer</title>
<style>
  :root{
    color-scheme: light dark;
    --brand:#003478; --brand-2:#0a4bb3; --red:#c8102e;
    --page:#eef1f5; --surface:#ffffff; --ink:#0e1726; --ink-2:#4a5568; --border:#d7dee8; --bad:#c8102e;
  }
  @media (prefers-color-scheme: dark){
    :root{ --brand:#1b4ea0; --brand-2:#5b8def;
      --page:#0c1017; --surface:#141a24; --ink:#f2f5fa; --ink-2:#b8c2d0; --border:#2b3442; --bad:#ef5a6f; }
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--page);
       font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
        width:min(92vw,410px);box-shadow:0 8px 30px rgba(16,23,38,.10);overflow:hidden}
  .cap{background:#ffffff;border-bottom:3px solid #003478;padding:22px 32px 18px;text-align:center}
  .cap .accent{height:2px;background:#c8102e;margin:14px -32px -18px}
  #logo{height:60px;display:inline-block}
  .wordmark{display:none;flex-direction:column;line-height:1;align-items:center}
  .wordmark b{color:#003478;font-size:26px;font-weight:800;letter-spacing:.05em}
  .wordmark small{color:#c8102e;font-size:11px;font-weight:700;letter-spacing:.22em;margin-top:4px}
  .body{padding:26px 32px 30px}
  h1{font-size:17px;margin:0 0 4px;font-weight:800}
  p{margin:0 0 18px;color:var(--ink-2);font-size:13.5px}
  input{width:100%;padding:11px 13px;font-size:16px;border:1px solid var(--border);border-radius:8px;background:var(--page);color:var(--ink)}
  input:focus{outline:2px solid var(--brand-2);outline-offset:1px;border-color:transparent}
  button{margin-top:14px;width:100%;padding:12px;font-size:15px;font-weight:700;border:0;border-radius:8px;background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(0,52,120,.30),inset 0 1px 0 rgba(255,255,255,.15);transition:box-shadow .12s ease,transform .05s ease,filter .12s ease}
  button:hover{filter:brightness(1.08);box-shadow:0 5px 12px rgba(0,52,120,.34),inset 0 1px 0 rgba(255,255,255,.15)}
  button:active{transform:translateY(1px)}
  .msg{color:var(--bad);font-size:14px;min-height:20px;margin:10px 0 0}
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="cap">
      <img id="logo" src="/logo.png" alt="Whiteface Ford" onerror="this.style.display='none';document.getElementById('wordmark').style.display='inline-flex'">
      <span id="wordmark" class="wordmark"><b>WHITEFACE FORD</b><small>HEREFORD, TEXAS</small></span>
      <div class="accent"></div>
    </div>
    <div class="body">
      <h1>Warranty Ticket Reviewer</h1>
      <p>AI review of warranty repair-order documentation before the claim goes in. Enter your access code to continue.</p>
      <input type="password" name="code" placeholder="Access code" autofocus autocomplete="current-password" required>
      <div class="msg"><!--MSG--></div>
      <button type="submit">Enter</button>
    </div>
  </form>
</body>
</html>
