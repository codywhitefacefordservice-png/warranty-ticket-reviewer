<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Sign in — ClaimProof</title>
<style>
  :root{
    color-scheme: light dark;
    --brand:#12294d; --brand-2:#2f80ed; --accent:#2f80ed;
    --page:#eef1f5; --surface:#ffffff; --ink:#0e1726; --ink-2:#4a5568; --border:#d7dee8; --bad:#c8102e;
  }
  @media (prefers-color-scheme: dark){
    :root{ --brand:#2b527f; --brand-2:#5b8def;
      --page:#0c1017; --surface:#141a24; --ink:#f2f5fa; --ink-2:#b8c2d0; --border:#2b3442; --bad:#ef5a6f; }
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--page);
       font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
        width:min(92vw,420px);box-shadow:0 8px 30px rgba(16,23,38,.10);overflow:hidden}
  .cap{background:#ffffff;padding:26px 32px 20px;text-align:center;border-bottom:1px solid var(--border)}
  .cap svg{width:min(70vw,260px);height:auto;display:inline-block}
  .body{padding:24px 32px 30px}
  h1{font-size:16px;margin:0 0 4px;font-weight:800}
  p{margin:0 0 16px;color:var(--ink-2);font-size:13.5px}
  label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;padding:11px 13px;font-size:16px;border:1px solid var(--border);border-radius:8px;background:var(--page);color:var(--ink)}
  input:focus{outline:2px solid var(--brand-2);outline-offset:1px;border-color:transparent}
  button{margin-top:18px;width:100%;padding:12px;font-size:15px;font-weight:700;border:0;border-radius:8px;background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(18,41,77,.30),inset 0 1px 0 rgba(255,255,255,.15);transition:box-shadow .12s ease,transform .05s ease,filter .12s ease}
  button:hover{filter:brightness(1.15);box-shadow:0 5px 12px rgba(18,41,77,.34),inset 0 1px 0 rgba(255,255,255,.15)}
  button:active{transform:translateY(1px)}
  .msg{color:var(--bad);font-size:14px;min-height:20px;margin:12px 0 0;text-align:center}
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="cap">
      <svg viewBox="0 0 560 150" role="img" aria-label="ClaimProof">
        <defs><linearGradient id="cpShield" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f80ed"/><stop offset="1" stop-color="#1b56b0"/></linearGradient></defs>
        <path d="M62 10 L110 28 L110 76 C110 106 88 126 62 140 C36 126 14 106 14 76 L14 28 Z" fill="#12294d"/>
        <path d="M62 18 L103 33 L103 75 C103 101 84 118 62 130 C40 118 21 101 21 75 L21 33 Z" fill="url(#cpShield)"/>
        <rect x="35" y="41" width="42" height="52" rx="5" fill="#ffffff"/>
        <rect x="42" y="52" width="28" height="5" rx="2.5" fill="#12294d"/>
        <rect x="42" y="63" width="28" height="5" rx="2.5" fill="#2f80ed"/>
        <rect x="42" y="74" width="20" height="5" rx="2.5" fill="#12294d"/>
        <path d="M34 78 L52 96 L96 34" fill="none" stroke="#2f80ed" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="140" y="82" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="62" font-weight="800" letter-spacing="-1"><tspan fill="#12294d">Claim</tspan><tspan fill="#2f80ed">Proof</tspan></text>
        <rect x="142" y="98" width="404" height="3" rx="1.5" fill="#2f80ed"/>
        <text x="144" y="126" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="23" font-weight="600" fill="#1c3a5e">Stronger Claims. Fewer chargebacks.</text>
      </svg>
    </div>
    <div class="body">
      <h1>Sign in</h1>
      <p>AI review of warranty repair-order documentation before the claim goes in.</p>
      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="you@dealership.com" autofocus autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Your password" autocomplete="current-password" required>
      <div class="msg"><!--MSG--></div>
      <button type="submit">Sign in</button>
    </div>
  </form>
</body>
</html>
