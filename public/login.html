<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Sign in — ClaimProof</title>
<style>
  :root{
    color-scheme:light;
    --brand:#123a86; --brand-2:#2f6bd8; --accent:#2f6bd8;
    --page:#f4f6f9; --surface:#ffffff; --ink:#141b2b; --ink-2:#5a6577; --border:#e6e9f0; --line-2:#eef1f6; --bad:#c8102e;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
       background:radial-gradient(1100px 520px at 50% -260px, rgba(47,107,216,.12), transparent 60%), var(--page);
       font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
        width:min(94vw,420px);box-shadow:0 1px 3px rgba(16,24,40,.06),0 24px 48px -24px rgba(16,24,40,.35);overflow:hidden}
  .cap{background:linear-gradient(180deg,#fafcff,#ffffff);padding:30px 32px 22px;text-align:center;border-bottom:1px solid var(--line-2)}
  .cap svg{width:min(70vw,250px);height:auto;display:inline-block}
  .body{padding:26px 32px 32px}
  h1{font-size:19px;margin:0 0 5px;font-weight:800;letter-spacing:-.01em}
  p{margin:0 0 18px;color:var(--ink-2);font-size:14px}
  label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;padding:12px 14px;font-size:16px;border:1px solid #d9dee8;border-radius:10px;background:#fff;color:var(--ink);transition:border-color .13s,box-shadow .13s}
  input:focus{outline:none;border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(47,107,216,.16)}
  button{margin-top:22px;width:100%;padding:13px;font-size:15px;font-weight:700;border:0;border-radius:10px;background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(18,58,134,.26);transition:background .13s ease,box-shadow .13s ease,transform .05s ease}
  button:hover{background:#0f337a;box-shadow:0 6px 16px rgba(18,58,134,.32)}
  button:active{transform:translateY(1px)}
  .msg{color:var(--bad);font-size:14px;min-height:20px;margin:12px 0 0;text-align:center}
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="cap">
      <svg viewBox="0 0 560 150" role="img" aria-label="ClaimProof">
        <defs><linearGradient id="cpShield" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f80ed"/><stop offset="1" stop-color="#1b56b0"/></linearGradient></defs>
        <path d="M62 10 L110 28 L110 76 C110 106 88 126 62 140 C36 126 14 106 14 76 L14 28 Z" fill="#12294d"/>
        <path d="M62 18 L103 33 L103 75 C103 101 84 118 62 130 C40 118 21 101 21 75 L21 33 Z" fill="url(#cpShield)"/>
        <rect x="35" y="41" width="42" height="52" rx="5" fill="#ffffff"/>
        <rect x="42" y="52" width="28" height="5" rx="2.5" fill="#12294d"/>
        <rect x="42" y="63" width="28" height="5" rx="2.5" fill="#2f80ed"/>
        <rect x="42" y="74" width="20" height="5" rx="2.5" fill="#12294d"/>
        <path d="M34 78 L52 96 L96 34" fill="none" stroke="#2f80ed" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="140" y="82" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="62" font-weight="800" letter-spacing="-1"><tspan fill="#12294d">Claim</tspan><tspan fill="#2f80ed">Proof</tspan></text>
        <rect x="142" y="98" width="404" height="3" rx="1.5" fill="#2f80ed"/>
        <text x="144" y="126" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="23" font-weight="600" fill="#1c3a5e">Stronger Claims. Fewer chargebacks.</text>
      </svg>
    </div>
    <div class="body">
      <h1>Sign in</h1>
      <p>AI review of warranty repair-order documentation before the claim goes in.</p>
      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="you@dealership.com" autofocus autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Your password" autocomplete="current-password" required>
      <div class="msg"><!--MSG--></div>
      <button type="submit">Sign in</button>
    </div>
  </form>
</body>
</html>
