<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Sign in — Warranty Ticket Reviewer</title>
<style>
  :root{
    color-scheme: light dark;
    --brand:#1f3a5f; --brand-2:#3a6ea5; --accent:#c8102e;
    --page:#eef1f5; --surface:#ffffff; --ink:#0e1726; --ink-2:#4a5568; --border:#d7dee8; --bad:#c8102e;
  }
  @media (prefers-color-scheme: dark){
    :root{ --brand:#2b527f; --brand-2:#5b8def;
      --page:#0c1017; --surface:#141a24; --ink:#f2f5fa; --ink-2:#b8c2d0; --border:#2b3442; --bad:#ef5a6f; }
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--page);
       font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
        width:min(92vw,410px);box-shadow:0 8px 30px rgba(16,23,38,.10);overflow:hidden}
  .cap{background:linear-gradient(180deg,var(--brand),var(--brand-2));padding:26px 32px;text-align:center;color:#fff}
  .cap .mark{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:.02em}
  .cap .mark svg{width:26px;height:26px;flex:none}
  .cap .tag{margin-top:6px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.85}
  .body{padding:26px 32px 30px}
  h1{font-size:16px;margin:0 0 4px;font-weight:800}
  p{margin:0 0 18px;color:var(--ink-2);font-size:13.5px}
  label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;padding:11px 13px;font-size:16px;border:1px solid var(--border);border-radius:8px;background:var(--page);color:var(--ink)}
  input:focus{outline:2px solid var(--brand-2);outline-offset:1px;border-color:transparent}
  button{margin-top:18px;width:100%;padding:12px;font-size:15px;font-weight:700;border:0;border-radius:8px;background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(31,58,95,.30),inset 0 1px 0 rgba(255,255,255,.15);transition:box-shadow .12s ease,transform .05s ease,filter .12s ease}
  button:hover{filter:brightness(1.1);box-shadow:0 5px 12px rgba(31,58,95,.34),inset 0 1px 0 rgba(255,255,255,.15)}
  button:active{transform:translateY(1px)}
  .msg{color:var(--bad);font-size:14px;min-height:20px;margin:12px 0 0;text-align:center}
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="cap">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
        Warranty Ticket Reviewer
      </div>
      <div class="tag">Claim-readiness review</div>
    </div>
    <div class="body">
      <h1>Sign in</h1>
      <p>AI review of warranty repair-order documentation before the claim goes in.</p>
      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="you@dealership.com" autofocus autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Your password" autocomplete="current-password" required>
      <div class="msg"><!--MSG--></div>
      <button type="submit">Sign in</button>
    </div>
  </form>
</body>
</html>
