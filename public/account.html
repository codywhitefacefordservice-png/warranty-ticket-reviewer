<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Account — Whiteface Ford</title>
<style>
  :root{
    color-scheme: light dark;
    --brand:#003478; --brand-2:#0a4bb3; --red:#c8102e;
    --page:#eef1f5; --surface:#ffffff; --ink:#0e1726; --ink-2:#4a5568; --muted:#8a94a6;
    --grid:#e3e8ef; --border:#d7dee8; --good:#0a8a3a; --bad:#c8102e;
  }
  @media (prefers-color-scheme: dark){
    :root{ --brand:#1b4ea0; --brand-2:#5b8def; --red:#ef5a6f;
      --page:#0c1017; --surface:#141a24; --ink:#f2f5fa; --ink-2:#b8c2d0; --muted:#7c8698;
      --grid:#242c38; --border:#2b3442; --good:#38c172; --bad:#ef5a6f; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .topbar{background:#ffffff;border-bottom:3px solid #003478}
  .accent{height:2px;background:#c8102e}
  .topbar-in{max-width:1040px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none}
  #logo{height:48px;display:block}
  .wordmark{display:none;flex-direction:column;line-height:1}
  .wordmark b{color:#003478;font-size:22px;font-weight:800;letter-spacing:.05em}
  .wordmark small{color:#c8102e;font-size:10px;font-weight:700;letter-spacing:.22em;margin-top:3px}
  .nav a{color:#4a5568;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;text-decoration:none;margin-left:16px;white-space:nowrap}
  .nav a:hover{color:#0a4bb3} .nav a.active{color:#003478;border-bottom:2px solid #003478;padding-bottom:2px}
  .wrap{max-width:560px;margin:0 auto;padding:22px 16px 64px}
  .page-title{font-size:20px;font-weight:800;margin:6px 0 2px}
  .page-sub{color:var(--ink-2);font-size:13px;margin-bottom:18px}
  h2{font-size:14px;margin:0 0 12px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--brand)}
  @media (prefers-color-scheme: dark){ h2{color:var(--brand-2)} }
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 2px rgba(16,23,38,.04)}
  label{display:block;font-size:11.5px;font-weight:800;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 5px}
  input{width:100%;padding:10px 12px;font-size:15px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--ink)}
  input:focus{outline:2px solid var(--brand-2);outline-offset:1px;border-color:transparent}
  button{margin-top:16px;padding:11px 22px;font-size:14px;font-weight:700;border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(0,52,120,.28)}
  button:hover{filter:brightness(1.1)}
  .kv{color:var(--ink-2);font-size:13.5px} .kv b{color:var(--ink)}
  .msg{font-size:14px;min-height:20px;margin-top:12px}
  .msg.err{color:var(--bad)} .msg.ok{color:var(--good)}
  .hint{color:var(--muted);font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-in">
  <a class="brand" href="/">
    <img id="logo" alt="" style="display:none">
    <span id="wordmark" class="wordmark"><b></b><small></small></span>
  </a>
  <nav class="nav">
    <a href="/">Reviewer</a>
    <a href="/appeal">Appeals</a>
    <a href="/history">History</a>
    <a href="/resources">Resources</a>
    <a href="/logout">Sign out</a>
  </nav>
</div></div>
<div class="accent"></div>

<div class="wrap">
  <div class="page-title">Account</div>
  <div class="page-sub">Signed in as <b id="who">…</b></div>

  <div class="card">
    <h2>Change password</h2>
    <label for="cur">Current password</label>
    <input id="cur" type="password" autocomplete="current-password" placeholder="Your current password">
    <label for="nw">New password</label>
    <input id="nw" type="password" autocomplete="new-password" placeholder="At least 8 characters">
    <label for="cf">Confirm new password</label>
    <input id="cf" type="password" autocomplete="new-password" placeholder="Re-enter new password">
    <div class="hint">Your session stays signed in after you change it.</div>
    <button id="save">Update password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const $=(s)=>document.querySelector(s);
fetch("/api/me").then(r=>r.ok?r.json():null).then(d=>{ if(d&&d.user){ $("#who").textContent=(d.user.name?d.user.name+" · ":"")+d.user.email; } }).catch(()=>{});
$("#save").onclick=async()=>{
  const cur=$("#cur").value, nw=$("#nw").value, cf=$("#cf").value, m=$("#msg");
  if(nw.length<8){ m.className="msg err"; m.textContent="New password must be at least 8 characters."; return; }
  if(nw!==cf){ m.className="msg err"; m.textContent="New passwords don't match."; return; }
  const r=await fetch("/api/change-password",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({current:cur,next:nw})});
  const d=await r.json().catch(()=>({}));
  if(r.ok){ m.className="msg ok"; m.textContent="Password updated."; $("#cur").value=$("#nw").value=$("#cf").value=""; }
  else { m.className="msg err"; m.textContent=d.error||"Could not update password."; }
};
</script>
<script>
(function(){
  function apply(d){
    if(!d||!d.store)return; var st=d.store;
    var b=document.querySelector("#wordmark b"), s=document.querySelector("#wordmark small");
    if(b)b.textContent=(st.name||"").toUpperCase(); if(s)s.textContent=(st.city||"").toUpperCase();
    try{ if(document.title) document.title=document.title.replace(/Whiteface Ford/gi, st.name); }catch(e){}
    var logo=document.getElementById("logo"), wm=document.getElementById("wordmark");
    if(logo){
      logo.onload=function(){logo.style.display="block"; if(wm)wm.style.display="none";};
      logo.onerror=function(){logo.style.display="none"; if(wm)wm.style.display="flex";};
      logo.alt=st.name||""; logo.src=st.logoUrl;
    } else if(wm){ wm.style.display="flex"; }
    try{
      var nav=document.querySelector(".nav");
      if(nav && !nav.querySelector("[data-acct]")){
        var so=nav.querySelector('a[href="/logout"]');
        if(d.user && d.user.role==="owner"){ var con=document.createElement("a"); con.href="/console"; con.textContent="Console"; con.setAttribute("data-con","1"); if(so)nav.insertBefore(con,so); else nav.appendChild(con); }
        var ac=document.createElement("a"); ac.href="/account"; ac.textContent="Account"; ac.className="active"; ac.setAttribute("data-acct","1"); if(so)nav.insertBefore(ac,so); else nav.appendChild(ac);
      }
    }catch(e){}
  }
  fetch("/api/me").then(function(r){return r.ok?r.json():null;}).then(apply).catch(function(){});
})();
</script>
</body>
</html>
